<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e1612" />
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the wrong theme.
      (function () {
        var theme = "dark";
        try {
          if (localStorage.getItem("chatmux-theme") === "light") {
            theme = "light";
          }
        } catch (error) {
          // localStorage may be unavailable (private mode / disabled storage); fall back to dark.
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <meta name="description" content="Self-hosted SSH and tmux workspace client." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ChatMux" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>ChatMux</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
