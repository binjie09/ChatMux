      <div style="max-width:760px;margin:0 auto;padding:32px 20px;font-family:system-ui,sans-serif;color:#e9f2ed;background:#0a0f0d">
        <h1>ChatMux — 自托管 SSH / tmux 终端客户端</h1>
        <p>
          ChatMux 是开源的自托管 SSH / tmux 工作空间客户端。用浏览器、桌面或手机连接你自己的
          Gateway，恢复远程 tmux 会话、查看历史上下文，并在真实终端里继续工作。Web、桌面（Tauri）、移动（Capacitor）共享同一套真实终端体验。
        </p>
        <h2>核心功能</h2>
        <ul>
          <li>真实终端：xterm.js + WebSocket PTY，兼容 vim、top、htop、lazygit、codex 等 TUI</li>
          <li>tmux 会话管理：列出、创建、命名、标记、跨设备恢复远程 tmux session</li>
          <li>移动端优先：手机 / 平板上的主机管理、会话列表、窗口切换、真实终端输入</li>
          <li>历史上下文：捕获 tmux pane 历史，侧栏搜索与回溯</li>
          <li>自托管与安全：Gateway 边界、凭据不回传、本地优先 SQLite、审计与生物识别解锁</li>
          <li>全平台客户端：Web SPA、Windows 便携 exe、macOS dmg、Linux deb/AppImage、Android APK、iOS</li>
        </ul>
        <h2>快速自托管</h2>
        <pre style="overflow:auto;background:#0e1612;padding:12px;border-radius:8px">git clone git@github.com:binjie09/ChatMux.git && cd ChatMux
cp deploy/web/.env.example deploy/web/.env
docker compose --env-file deploy/web/.env -f deploy/web/docker-compose.yml up -d --build</pre>
