<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1612"/>
      <stop offset="1" stop-color="#06090a"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cffb2"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#1d2b25" stroke-width="2"/>
  <!-- split divider -->
  <line x1="32" y1="18" x2="32" y2="50" stroke="#1d2b25" stroke-width="2"/>
  <line x1="14" y1="18" x2="50" y2="18" stroke="#1d2b25" stroke-width="1.5" opacity="0.6"/>
  <!-- left pane prompt -->
  <polyline points="9,28 14,32 9,36" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="17" y1="36" x2="25" y2="36" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
  <!-- right pane dots (session list) -->
  <circle cx="40" cy="29" r="2.4" fill="url(#g)"/>
  <circle cx="48" cy="29" r="2.4" fill="#2dd4bf" opacity="0.55"/>
  <rect x="37" y="34" width="13" height="2.4" rx="1.2" fill="#7cffb2" opacity="0.45"/>
  <rect x="37" y="39.5" width="9" height="2.4" rx="1.2" fill="#2dd4bf" opacity="0.35"/>
  <rect x="37" y="45" width="11" height="2.4" rx="1.2" fill="#7cffb2" opacity="0.25"/>
</svg>
