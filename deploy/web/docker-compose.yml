services:
  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      CHATMUX_ADDR: ":19327"
      CHATMUX_DB: "${CHATMUX_DB:-/data/chatmux.db}"
      CHATMUX_GATEWAY_TOKEN: "${CHATMUX_GATEWAY_TOKEN:?CHATMUX_GATEWAY_TOKEN is required}"
      CHATMUX_USERS_JSON: "${CHATMUX_USERS_JSON:-}"
      CHATMUX_COMMAND_POLICY_MODE: "${CHATMUX_COMMAND_POLICY_MODE:-enforce}"
      CHATMUX_COMMAND_DENY_PATTERNS_JSON: "${CHATMUX_COMMAND_DENY_PATTERNS_JSON:-}"
      CHATMUX_AUTOMATION_CAPABILITIES_JSON: "${CHATMUX_AUTOMATION_CAPABILITIES_JSON:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
    volumes:
      - chatmux-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:19327/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${CHATMUX_HTTP_PORT:-8080}:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  chatmux-data:
