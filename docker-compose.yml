services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.dev
    network_mode: host
    user: "${CHATMUX_UID:-1000}:${CHATMUX_GID:-1000}"
    working_dir: /workspace/services/gateway
    environment:
      CGO_ENABLED: "1"
      GOCACHE: /tmp/chatmux-go/build
      GOMODCACHE: /tmp/chatmux-go/pkg/mod
      CHATMUX_ADDR: ":${CHATMUX_GATEWAY_PORT:-19327}"
      CHATMUX_DB: "${CHATMUX_DB:-/workspace/chatmux.db}"
      CHATMUX_GATEWAY_TOKEN: "${CHATMUX_GATEWAY_TOKEN:-}"
      CHATMUX_USERS_JSON: "${CHATMUX_USERS_JSON:-}"
      CHATMUX_COMMAND_POLICY_MODE: "${CHATMUX_COMMAND_POLICY_MODE:-enforce}"
      CHATMUX_COMMAND_DENY_PATTERNS_JSON: "${CHATMUX_COMMAND_DENY_PATTERNS_JSON:-}"
      CHATMUX_AUTOMATION_CAPABILITIES_JSON: "${CHATMUX_AUTOMATION_CAPABILITIES_JSON:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
    volumes:
      - .:/workspace
    command: go run ./cmd/chatmux-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${CHATMUX_GATEWAY_PORT:-19327}/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  web:
    image: node:24-bookworm-slim
    network_mode: host
    user: "${CHATMUX_UID:-1000}:${CHATMUX_GID:-1000}"
    working_dir: /workspace
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      COREPACK_HOME: /tmp/chatmux-corepack
      HOME: /tmp/chatmux-node-home
      CHATMUX_WEB_PORT: "${CHATMUX_WEB_PORT:-5173}"
      PATH: "/tmp/chatmux-pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      PNPM_HOME: /tmp/chatmux-pnpm
      XDG_DATA_HOME: /tmp/chatmux-xdg
    volumes:
      - .:/workspace
    command: >
      sh -lc "corepack pnpm@10.33.2 install --frozen-lockfile &&
      corepack pnpm@10.33.2 --filter @chatmux/web exec vite
      --host 0.0.0.0 --port \"$${CHATMUX_WEB_PORT}\" --strictPort"
    depends_on:
      gateway:
        condition: service_healthy
