name: Build Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NODE_VERSION: "24.14.1"
  PNPM_VERSION: "10.33.2"
  GO_VERSION: "1.24.x"
  RUST_TOOLCHAIN: "1.96.0"
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  macos:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: chatmux-macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - artifact: chatmux-macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/gateway/go.sum

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add "${{ matrix.target }}"

      - name: Install pnpm dependencies
        run: |
          corepack enable
          corepack prepare "pnpm@$PNPM_VERSION" --activate
          pnpm install --frozen-lockfile

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            exit 0
          fi
          if [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "APPLE_CERTIFICATE_PASSWORD is required when APPLE_CERTIFICATE is set" >&2
            exit 2
          fi

          cert_path="$RUNNER_TEMP/chatmux-apple-certificate.p12"
          keychain_path="$RUNNER_TEMP/chatmux-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          echo "::add-mask::$keychain_password"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          if [[ -n "${APPLE_SIGNING_IDENTITY_SECRET:-}" ]]; then
            identity="$APPLE_SIGNING_IDENTITY_SECRET"
          else
            identity="$(security find-identity -v -p codesigning "$keychain_path" \
              | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          fi
          if [[ -z "$identity" ]]; then
            echo "No Developer ID Application identity found in APPLE_CERTIFICATE" >&2
            exit 2
          fi

          printf 'APPLE_SIGNING_IDENTITY=%s\n' "$identity" >> "$GITHUB_ENV"
          echo "CHATMUX_MACOS_SIGNED=1" >> "$GITHUB_ENV"

      - name: Configure macOS signing mode
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ "${CHATMUX_MACOS_SIGNED:-}" != "1" && -n "${APPLE_SIGNING_IDENTITY_SECRET:-}" ]]; then
            printf 'APPLE_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY_SECRET" >> "$GITHUB_ENV"
            echo "CHATMUX_MACOS_SIGNED=1" >> "$GITHUB_ENV"
            CHATMUX_MACOS_SIGNED=1
          fi

          if [[ "${CHATMUX_MACOS_SIGNED:-}" == "1" ]]; then
            echo "CHATMUX_MACOS_AD_HOC=" >> "$GITHUB_ENV"
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
              echo "CHATMUX_MACOS_SKIP_STAPLING=" >> "$GITHUB_ENV"
            else
              echo "CHATMUX_MACOS_SKIP_STAPLING=1" >> "$GITHUB_ENV"
              echo "::notice title=macOS notarization disabled::Set APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID secrets to notarize macOS artifacts for Gatekeeper."
            fi
          else
            echo "CHATMUX_MACOS_AD_HOC=1" >> "$GITHUB_ENV"
            echo "CHATMUX_MACOS_SKIP_STAPLING=1" >> "$GITHUB_ENV"
            echo "::notice title=macOS ad-hoc artifact::Set Apple Developer ID signing and notarization secrets to produce Gatekeeper-ready macOS artifacts."
          fi

      - name: Build macOS artifact
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CHATMUX_TRACE_BUILD: "1"
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          set -o pipefail
          mkdir -p .tmp/logs
          log_path=".tmp/logs/macos-${{ matrix.target }}.log"
          if pnpm --filter @chatmux/web desktop:build:macos 2>&1 | tee "$log_path"; then
            exit 0
          fi

          tail_output="$(tail -n 80 "$log_path")"
          tail_output="${tail_output//'%'/'%25'}"
          tail_output="${tail_output//$'\r'/'%0D'}"
          tail_output="${tail_output//$'\n'/'%0A'}"
          echo "::error title=macOS artifact build failed::$tail_output"
          exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: .tmp/artifacts/macos-${{ matrix.target }}/
          if-no-files-found: error

      - name: Upload macOS failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-failure-log
          path: .tmp/logs/macos-${{ matrix.target }}.log
          if-no-files-found: ignore

  linux:
    name: chatmux-linux-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2t64 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/gateway/go.sum

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add x86_64-unknown-linux-gnu

      - name: Install pnpm dependencies
        run: |
          corepack enable
          corepack prepare "pnpm@$PNPM_VERSION" --activate
          pnpm install --frozen-lockfile

      - name: Build Linux artifact
        env:
          TAURI_TARGET_TRIPLE: x86_64-unknown-linux-gnu
        run: pnpm desktop:build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: chatmux-linux-x64
          path: .tmp/artifacts/linux-x86_64-unknown-linux-gnu/
          if-no-files-found: error

  windows:
    name: chatmux-windows-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows portable exe
        run: bash packaging/windows/package-portable-exe.sh

      - uses: actions/upload-artifact@v4
        with:
          name: chatmux-windows-x64
          path: .tmp/artifacts/windows-x86_64-pc-windows-msvc/
          if-no-files-found: error

  android:
    name: chatmux-android-apk
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build Android debug APK
        run: bash packaging/android/package-apk.sh

      - uses: actions/upload-artifact@v4
        with:
          name: chatmux-android-apk
          path: .tmp/artifacts/android/
          if-no-files-found: error
