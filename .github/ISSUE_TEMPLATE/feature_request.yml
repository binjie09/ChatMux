name: Feature request
description: Suggest a ChatMux improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        请不要提交真实服务器地址、SSH 凭据、Gateway Token 或敏感终端输出。
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the expected behavior and UI/API shape if you have one.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
