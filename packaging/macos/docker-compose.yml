services:
  macos-artifact:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    environment:
      CI: "true"
      HOST_UID: "${CHATMUX_UID:-1000}"
      HOST_GID: "${CHATMUX_GID:-1000}"
      CHATMUX_MACOS_BUILDER: "${CHATMUX_MACOS_BUILDER:-}"
      CHATMUX_MACOS_REMOTE_DIR: "${CHATMUX_MACOS_REMOTE_DIR:-chatmux-build}"
      CHATMUX_MACOS_SSH_KEY: "${CHATMUX_MACOS_SSH_KEY:-}"
      CHATMUX_MACOS_SSH_PORT: "${CHATMUX_MACOS_SSH_PORT:-22}"
      CHATMUX_MACOS_AD_HOC: "${CHATMUX_MACOS_AD_HOC:-}"
      CHATMUX_MACOS_SKIP_STAPLING: "${CHATMUX_MACOS_SKIP_STAPLING:-}"
      CHATMUX_CREATE_UPDATER_ARTIFACTS: "${CHATMUX_CREATE_UPDATER_ARTIFACTS:-}"
      APPLE_SIGNING_IDENTITY: "${APPLE_SIGNING_IDENTITY:-}"
      APPLE_CERTIFICATE: "${APPLE_CERTIFICATE:-}"
      APPLE_CERTIFICATE_PASSWORD: "${APPLE_CERTIFICATE_PASSWORD:-}"
      APPLE_API_KEY: "${APPLE_API_KEY:-}"
      APPLE_API_KEY_PATH: "${APPLE_API_KEY_PATH:-}"
      APPLE_API_ISSUER: "${APPLE_API_ISSUER:-}"
      APPLE_ID: "${APPLE_ID:-}"
      APPLE_PASSWORD: "${APPLE_PASSWORD:-}"
      APPLE_TEAM_ID: "${APPLE_TEAM_ID:-}"
      APPLE_PROVIDER_SHORT_NAME: "${APPLE_PROVIDER_SHORT_NAME:-}"
      TAURI_SIGNING_PRIVATE_KEY: "${TAURI_SIGNING_PRIVATE_KEY:-}"
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
      TAURI_TARGET_TRIPLE: "${TAURI_TARGET_TRIPLE:-}"
      PNPM_STORE_DIR: "${PNPM_STORE_DIR:-}"
    volumes:
      - ../..:/workspace
      - ${HOME}/.ssh:/root/.ssh/host:ro
    command: bash /workspace/packaging/macos/build-remote.sh
